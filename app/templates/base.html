<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ShopLocal{% endblock %}</title>

  <!-- Playfair Display (headings) + Inter (body) — editorial pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --bg:       #e8d5b5;
      --white:    #f5ede0;
      --border:   #d0bfa0;
      --border-2: #b8a888;
      --ink:      #1a0f00;
      --ink-2:    #3d2e1a;
      --muted:    #7a6248;
      --muted-2:  #b09a7a;
      --danger:   #c0392b;
      --success:  #1a7a4a;
    }

    /* ── Reset / Base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding-bottom: 72px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, .serif { font-family: 'Playfair Display', serif; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── Top Nav ─────────────────────────────────────────── */
    .top-nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .top-nav .inner {
      max-width: 1280px; margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 14px 24px;
      gap: 12px;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: .02em;
      color: var(--ink);
      text-decoration: none;
      justify-self: center;
    }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .nav-right { display: flex; align-items: center; gap: 16px; justify-content: flex-end; }

    .nav-link {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 200ms;
      cursor: pointer;
    }
    .nav-link:hover { opacity: .55; color: var(--ink); }

    .nav-cart {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 200ms;
      cursor: pointer;
    }
    .nav-cart:hover { opacity: .55; color: var(--ink); }

    /* ── Bottom Nav ──────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 200;
    }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--ink-2);
      text-decoration: none;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 200ms;
      min-width: 56px;
    }
    .bnav-item i { font-size: 1.2rem; }
    .bnav-item:hover { color: var(--ink); }
    .bnav-sell {
      background: var(--ink);
      color: var(--white) !important;
      border-radius: 24px;
      padding: 8px 18px;
    }
    .bnav-sell:hover { background: var(--ink-2) !important; color: var(--white) !important; }
    .bnav-badge {
      position: absolute; top: 2px; right: 8px;
      background: var(--ink);
      color: var(--white);
      border-radius: 50%;
      width: 14px; height: 14px;
      font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .bnav-cart { position: relative; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-ink {
      background: var(--ink); color: var(--white);
      border: none; border-radius: 0;
      font-family: 'Inter', sans-serif;
      font-size: .78rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 13px 28px;
      cursor: pointer;
      transition: background 200ms;
      text-decoration: none; display: inline-block;
    }
    .btn-ink:hover { background: var(--ink-2); color: var(--white); }

    .btn-outline-ink {
      background: transparent; color: var(--ink);
      border: 1px solid var(--ink); border-radius: 0;
      font-size: .78rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 200ms, color 200ms;
      text-decoration: none; display: inline-block;
    }
    .btn-outline-ink:hover { background: var(--ink); color: var(--white); }

    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 0;
      font-size: .75rem; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: border-color 200ms, color 200ms;
      text-decoration: none; display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    /* Bootstrap overrides */
    .btn-primary { background: var(--ink); border: none; border-radius: 0; font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; transition: background 200ms; cursor: pointer; }
    .btn-primary:hover, .btn-primary:focus { background: var(--ink-2); border: none; }
    .btn-outline-secondary { background: transparent; border: 1px solid var(--border); border-radius: 0; color: var(--muted); font-size: .75rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; transition: border-color 200ms, color 200ms; cursor: pointer; }
    .btn-outline-secondary:hover { border-color: var(--ink); color: var(--ink); background: transparent; }
    .btn-success { background: var(--ink); border: none; border-radius: 0; font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; transition: background 200ms; cursor: pointer; }
    .btn-success:hover { background: var(--ink-2); border: none; color: var(--white); }
    .btn-outline-danger { background: transparent; border: 1px solid rgba(192,57,43,.4); border-radius: 0; color: var(--danger); font-size: .75rem; cursor: pointer; transition: background 200ms; }
    .btn-outline-danger:hover { background: rgba(192,57,43,.08); color: var(--danger); border-color: var(--danger); }

    /* ── Product Cards ───────────────────────────────────── */
    .product-card {
      background: var(--white);
      text-decoration: none;
      color: var(--ink);
      display: flex; flex-direction: column;
      cursor: pointer;
    }
    .product-card:hover { color: var(--ink); }
    .product-card .card-img-wrap {
      overflow: hidden;
      background: #d9c9aa;
      aspect-ratio: 3/4;
    }
    .product-card .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform 400ms cubic-bezier(.25,.46,.45,.94);
    }
    .product-card:hover .card-img-wrap img { transform: scale(1.05); }
    .product-card .card-img-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted-2);
    }
    .product-card .card-info {
      padding: 12px 0 0;
    }
    .card-name {
      font-size: .88rem; font-weight: 500; color: var(--ink);
      margin-bottom: 3px; line-height: 1.4;
    }
    .card-cat {
      font-size: .72rem; font-weight: 400; color: var(--muted);
      letter-spacing: .04em; margin-bottom: 4px;
    }
    .card-price {
      font-size: .88rem; font-weight: 600; color: var(--ink);
    }

    /* ── Forms ────────────────────────────────────────────── */
    .form-control, .form-select {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      padding: 11px 14px;
      transition: border-color 200ms;
    }
    .form-control:focus, .form-select:focus {
      background: var(--white);
      border-color: var(--ink);
      box-shadow: none;
      color: var(--ink);
      outline: none;
    }
    .form-control::placeholder { color: var(--muted-2); }
    .form-label { font-weight: 500; font-size: .82rem; color: var(--ink-2); margin-bottom: 6px; display: block; letter-spacing: .02em; }
    .form-text { font-size: .75rem; color: var(--muted); margin-top: 5px; }
    .input-group-text { background: var(--bg); border: 1px solid var(--border); border-radius: 0; color: var(--muted); font-weight: 600; }

    /* ── Surface card (forms, summaries) ─────────────────── */
    .surface { background: var(--white); border: 1px solid var(--border); }
    .surface-hd {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      font-size: .75rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--ink-2);
      display: flex; align-items: center; gap: 8px;
    }
    .surface-bd { padding: 20px; }
    .surface-ft {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
    }

    /* ── Category pills ────────────────────────────────────── */
    .cat-pill {
      display: inline-block;
      padding: 7px 16px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--muted);
      font-size: .72rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 200ms, color 200ms, border-color 200ms;
    }
    .cat-pill:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .cat-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    /* ── Badges ─────────────────────────────────────────────── */
    .badge-stock-ok  { font-size: .72rem; font-weight: 600; color: var(--success); display: inline-flex; align-items: center; gap: 4px; }
    .badge-stock-out { font-size: .72rem; font-weight: 600; color: var(--danger);  display: inline-flex; align-items: center; gap: 4px; }
    .badge-cat-label { font-size: .7rem; font-weight: 500; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }

    /* ── Table ──────────────────────────────────────────────── */
    .table { color: var(--ink); }
    .table thead th { background: var(--bg); color: var(--muted); font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding: 12px 16px; }
    .table tbody td { border-color: var(--border); padding: 14px 16px; vertical-align: middle; font-size: .88rem; }
    .table-hover tbody tr:hover td { background: var(--bg); }

    /* ── Alert ──────────────────────────────────────────────── */
    .alert-err { background: #fdf2f2; border: 1px solid #f5c6c6; color: #922; padding: 14px 18px; font-size: .88rem; }

    /* ── Breadcrumb ─────────────────────────────────────────── */
    .breadcrumb { margin: 0; }
    .breadcrumb-item + .breadcrumb-item::before { color: var(--muted-2); content: "/"; }
    .breadcrumb-item a { color: var(--muted); text-decoration: none; font-size: .75rem; letter-spacing: .04em; }
    .breadcrumb-item a:hover { color: var(--ink); }
    .breadcrumb-item.active { color: var(--ink-2); font-size: .75rem; }

    /* ── Divider ────────────────────────────────────────────── */
    hr { border-color: var(--border); opacity: 1; }

    /* ── Container ──────────────────────────────────────────── */
    .container { max-width: 1280px; }

    /* ── Section spacing ─────────────────────────────────────── */
    .section   { padding: 56px 0; }
    .section-sm { padding: 36px 0; }

    /* ── Section title ───────────────────────────────────────── */
    .section-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.75rem; color: var(--ink); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .top-nav .inner { grid-template-columns: auto 1fr auto; padding: 12px 16px; }
      .brand { justify-self: start; font-size: 1.1rem; }
      .nav-left { display: none; }
      .section { padding: 40px 0; }
    }

    /* ── Page Transitions ────────────────────────────────────── */
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pageExit {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    @keyframes cardClick {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1.015); }
    }

    .page-content { animation: pageEnter 320ms cubic-bezier(.22,1,.36,1) both; }
    body.page-exiting .page-content { animation: pageExit 180ms ease forwards; pointer-events: none; }
    .product-card.card-clicking .card-img-wrap img { transform: scale(1.08); transition-duration: 180ms; }

    @media (prefers-reduced-motion: reduce) {
      .page-content, body.page-exiting .page-content { animation: none !important; }
      .product-card .card-img-wrap img, .product-card:hover .card-img-wrap img { transform: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<!-- Top Nav -->
<header class="top-nav" role="banner">
  <div class="inner">
    <div></div>

    <a href="/" class="brand" aria-label="ShopLocal home">ShopLocal</a>

    <nav class="nav-right" aria-label="Account navigation">
      {% if current_user %}
      <a href="/profile/" class="nav-link">{{ current_user.username }}</a>
      <form method="post" action="/logout/" style="margin:0;">
        <button type="submit" class="nav-link" style="background:none;border:none;padding:0;cursor:pointer;">
          Sign Out
        </button>
      </form>
      {% else %}
      <a href="/login/" class="nav-link">Sign In</a>
      {% endif %}
      <a href="/cart/" class="nav-cart" aria-label="Cart{% if cart_count %}, {{ cart_count }} items{% endif %}">
        Bag ({{ cart_count or 0 }})
      </a>
    </nav>
  </div>
</header>

<div class="page-content">
{% block content %}{% endblock %}
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
  <a href="/" class="bnav-item" aria-label="Home">
    <i class="bi bi-house" aria-hidden="true"></i>
    <span>Home</span>
  </a>
  <a href="/products/" class="bnav-item" aria-label="Shop">
    <i class="bi bi-grid" aria-hidden="true"></i>
    <span>Shop</span>
  </a>
  {% if current_user and current_user.is_admin %}
  <a href="/products/create/" class="bnav-item bnav-sell" aria-label="Add product">
    <i class="bi bi-plus-lg" style="font-size:1.25rem;" aria-hidden="true"></i>
    <span>Add</span>
  </a>
  {% else %}
  <a href="/checkout/" class="bnav-item" aria-label="Checkout">
    <i class="bi bi-bag-check" aria-hidden="true"></i>
    <span>Order</span>
  </a>
  {% endif %}
  <a href="/cart/" class="bnav-item bnav-cart" aria-label="Cart{% if cart_count %}, {{ cart_count }} items{% endif %}">
    <i class="bi bi-bag" aria-hidden="true"></i>
    <span>Bag</span>
    {% if cart_count %}<span class="bnav-badge" aria-hidden="true">{{ cart_count }}</span>{% endif %}
  </a>
  <a href="/checkout/" class="bnav-item" aria-label="Checkout">
    <i class="bi bi-credit-card" aria-hidden="true"></i>
    <span>Pay</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function go(url) {
    if (reduced) { location.href = url; return; }
    document.body.classList.add('page-exiting');
    setTimeout(function () { location.href = url; }, 180);
  }

  document.querySelectorAll('a.product-card').forEach(function (card) {
    card.addEventListener('click', function (e) {
      if (e.ctrlKey || e.metaKey || e.shiftKey) return;
      var href = card.getAttribute('href');
      if (!href || href.startsWith('#')) return;
      e.preventDefault();
      card.classList.add('card-clicking');
      setTimeout(function () { go(href); }, reduced ? 0 : 130);
    });
  });

  document.querySelectorAll('a[href]').forEach(function (link) {
    if (link.classList.contains('product-card')) return;
    link.addEventListener('click', function (e) {
      if (e.ctrlKey || e.metaKey || e.shiftKey) return;
      var href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
      e.preventDefault();
      go(href);
    });
  });
}());
</script>
</body>
</html>
