{% extends "base.html" %}
{% block title %}Create Account — ShopLocal{% endblock %}

{% block content %}
<div class="container" style="max-width:420px;padding-top:64px;padding-bottom:72px;">

  <div style="text-align:center;margin-bottom:36px;">
    <h1 style="font-family:'Playfair Display',serif;font-weight:700;font-size:2rem;color:var(--ink);margin-bottom:8px;">
      Create account
    </h1>
    <p style="font-size:.88rem;color:var(--muted);">Join ShopLocal — buy and sell locally</p>
  </div>

  {% if errors %}
  <div class="alert-err mb-4" role="alert">
    {% for e in errors %}<div>{{ e }}</div>{% endfor %}
  </div>
  {% endif %}

  <form method="post" novalidate>

    <div style="margin-bottom:16px;">
      <label class="form-label" for="r-user">Username</label>
      <input type="text" id="r-user" name="username" class="form-control"
             value="{{ form.get('username', '') }}"
             placeholder="e.g. jsmith"
             required aria-required="true" autocomplete="username">
    </div>

    <div style="margin-bottom:16px;">
      <label class="form-label" for="r-email">Email</label>
      <input type="email" id="r-email" name="email" class="form-control"
             value="{{ form.get('email', '') }}"
             placeholder="you@example.com"
             required aria-required="true" autocomplete="email">
    </div>

    <div style="margin-bottom:16px;">
      <label class="form-label" for="r-pass">Password <span style="color:var(--muted);font-weight:400;">(min. 6 characters)</span></label>
      <input type="password" id="r-pass" name="password" class="form-control"
             placeholder="••••••••"
             required aria-required="true" autocomplete="new-password">
    </div>

    <div style="margin-bottom:28px;">
      <label class="form-label" for="r-confirm">Confirm Password</label>
      <input type="password" id="r-confirm" name="confirm" class="form-control"
             placeholder="••••••••"
             required aria-required="true" autocomplete="new-password">
    </div>

    <button type="submit" class="btn-ink w-100" style="padding:14px;font-size:.82rem;cursor:pointer;">
      Create Account
    </button>

  </form>

  <div style="text-align:center;margin-top:24px;border-top:1px solid var(--border);padding-top:24px;">
    <p style="font-size:.82rem;color:var(--muted);">
      Already have an account?
      <a href="/login/" style="color:var(--ink);font-weight:700;text-decoration:underline;text-underline-offset:3px;">Sign in</a>
    </p>
  </div>

</div>
{% endblock %}
